<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/styles.css">
    <title>Travel Buddy</title>
    <style>
        /* Base styles */
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(-45deg, #87CEEB, #FFD700, #1a2a6c, #000046);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            overflow: hidden;
            position: relative;
        }

        /* Moving airplane image */
        .airplane-img {
            position: absolute;
            width: 100px;
            height: auto;
            animation: orbitAndFly 16s linear infinite;
            z-index: 1;
            opacity: 0.9;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.5));
        }

        /* Complex animation path */
        @keyframes orbitAndFly {
            0% {
                transform: translate(-200px, 50vh) rotate(0deg);
            }
            10% {
                transform: translate(50vw, 50vh) rotate(0deg);
            }
            30% {
                transform: 
                    translate(calc(50vw + 100px * cos(0deg)), 
                    calc(50vh + 100px * sin(0deg))) 
                    rotate(-360deg);
            }
            40% {
                transform: 
                    translate(calc(50vw + 150px * cos(90deg)), 
                    calc(50vh + 150px * sin(90deg))) 
                    rotate(-720deg);
            }
            50% {
                transform: 
                    translate(calc(50vw + 100px * cos(180deg)), 
                    calc(50vh + 100px * sin(180deg))) 
                    rotate(-1080deg);
            }
            60% {
                transform: 
                    translate(calc(50vw + 150px * cos(270deg)), 
                    calc(50vh + 150px * sin(270deg))) 
                    rotate(-1440deg);
            }
            70% {
                transform: translate(50vw, 50vh) rotate(-1800deg);
            }
            100% {
                transform: translate(calc(100vw + 200px), 50vh) rotate(-1800deg);
            }
        }

        /* Rest of the styles remain the same */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .heading {
            font-size: 3.5em;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            z-index: 2;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 2;
        }

        .start-button, .quiz-button {
            padding: 15px 40px;
            background-color: rgba(255,255,255,0.15);
            color: white;
            border-radius: 30px;
            font-size: 1.2em;
            font-weight: bold;
            transition: all 0.3s ease;
            border: 2px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
            text-decoration: none;
        }

        .start-button:hover, .quiz-button:hover {
            transform: translateY(-3px);
            background-color: rgba(255,255,255,0.25);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .twilight {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, 
                rgba(255,165,0,0.1) 0%,
                rgba(0,0,70,0.3) 100%);
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>
    <img src="https://www.freeiconspng.com/uploads/airplane-png-transparent-background-3.png" 
         class="airplane-img" 
         alt="Flying airplane">

    <div class="twilight"></div>
    
    <h1 class="heading">Travel Buddy</h1>
    
    <div class="button-container">
        <a href="pages/map.html" class="start-button">Start Planning</a>
        <a href="pages/interestQuiz.html" class="quiz-button">Take Interest Quiz</a>
    </div>
</body>
</html>
