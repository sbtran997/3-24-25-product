<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/styles.css">
    <title>Travel Buddy</title>
    <style>
        /* Background styling */
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: 
                linear-gradient(45deg, rgba(255,165,0,0.1), rgba(255,255,255,0.2)),
                url('https://www.freeiconspng.com/uploads/airplane-png-icon-26.png') center/cover no-repeat fixed,
                linear-gradient(to bottom right, #87CEEB, #FFD700);
            background-blend-mode: screen;
            position: relative;
            overflow: hidden;
        }

        /* Animated sun */
        body::before {
            content: '';
            position: absolute;
            top: 20px;
            right: 20px;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at 50% 50%, #FFD700, #FFA500 70%);
            border-radius: 50%;
            box-shadow: 0 0 50px #FFA500;
            animation: pulse 2s infinite;
        }

        /* Cloud animation */
        body::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200px;
            background: url('https://www.freeiconspng.com/uploads/white-cloud-png-28.png') repeat-x;
            bottom: -50px;
            opacity: 0.3;
            animation: clouds 20s linear infinite;
            z-index: -1;
        }

        /* Content styling */
        .heading {
            font-size: 3.5em;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            z-index: 1;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 1;
        }

        .start-button, .quiz-button {
            padding: 15px 40px;
            background-color: rgba(0,123,255,0.9);
            color: white;
            border-radius: 30px;
            font-size: 1.2em;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 2px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(5px);
        }

        .quiz-button {
            background-color: rgba(108,117,125,0.9);
        }

        .start-button:hover, .quiz-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes clouds {
            from { transform: translateX(-50%); }
            to { transform: translateX(50%); }
        }
    </style>
</head>
<body>
    <h1 class="heading">Travel Buddy</h1>
    
    <div class="button-container">
        <a href="pages/map.html" class="start-button">Start Planning</a>
        <a href="pages/interestQuiz.html" class="quiz-button">Take Interest Quiz</a>
    </div>
</body>
</html>
